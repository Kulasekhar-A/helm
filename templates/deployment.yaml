apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  labels:
    project: roboshop
    purpose: deployment-demo
    tier: frontend
    component: frontend
  annotations:
      kubernetes.io/change-cause: "{{ .Values.deployment.changeCause }}"
spec:
  replicas: "{{ .Values.deployment.replicas }}"
  selector:
    matchLabels:
      project: roboshop
      purpose: deployment-demo
      tier: frontend
      component: frontend
  template:
    metadata:
      labels:
        project: roboshop
        purpose: deployment-demo
        tier: frontend
        component: frontend
    spec:
      containers:
      - name: nginx
        image: nginx:"{{ .Values.deployment.imageVersion }}""